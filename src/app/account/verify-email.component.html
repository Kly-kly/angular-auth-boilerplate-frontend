<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Email Verification</h3>
        </div>
        <div class="card-body text-center">
          <!-- Verifying state -->
          <div *ngIf="emailStatus === EmailStatus.Verifying" class="py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 mb-0">Verifying your email...</p>
          </div>
          
          <!-- Failed state -->
          <div *ngIf="emailStatus === EmailStatus.Failed" class="py-4">
            <div class="alert alert-danger">
              {{ errorMessage }}
            </div>
            <a routerLink="/account/login" class="btn btn-primary">Go to Login</a>
            <a routerLink="/account/register" class="btn btn-link">Register Again</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
