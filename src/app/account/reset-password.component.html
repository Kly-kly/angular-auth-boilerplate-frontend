<div class="card-body">
  <h3 class="card-title text-center mb-4">Reset Password</h3>
  
  <div *ngIf="tokenStatus == TokenStatus.Validating" class="text-center">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2">Validating token...</p>
  </div>
  
  <div *ngIf="tokenStatus == TokenStatus.Invalid" class="alert alert-danger">
    Token validation failed. <a routerLink="../forgot-password">Request a new one</a>
  </div>
  
  <form *ngIf="tokenStatus == TokenStatus.Valid" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">New Password</label>
      <input type="password" formControlName="password" class="form-control" [ngClass]="{'is-invalid': submitted && f['password'].errors}">
      <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
        <div *ngIf="f['password'].errors['required']">Password is required</div>
        <div *ngIf="f['password'].errors['minlength']">Minimum 6 characters</div>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Confirm Password</label>
      <input type="password" formControlName="confirmPassword" class="form-control" [ngClass]="{'is-invalid': submitted && f['confirmPassword'].errors}">
      <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
        <div *ngIf="f['confirmPassword'].errors['required']">Confirm password required</div>
        <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
      </div>
    </div>
    <div class="d-grid">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
        Reset Password
      </button>
    </div>
  </form>
</div>
