<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Reset Password</h3>
        </div>
        <div class="card-body">
          <!-- Validating token -->
          <div *ngIf="tokenStatus === TokenStatus.Validating" class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Validating...</span>
            </div>
            <p class="mt-3 mb-0">Validating your reset link...</p>
          </div>

          <!-- Token invalid -->
          <div *ngIf="tokenStatus === TokenStatus.Invalid" class="text-center py-4">
            <div class="alert alert-danger">
              Invalid or expired reset token. Please request a new password reset.
            </div>
            <a routerLink="/account/forgot-password" class="btn btn-primary">Request New Reset Link</a>
          </div>

          <!-- Token valid - show reset form -->
          <div *ngIf="tokenStatus === TokenStatus.Valid">
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
              <div class="mb-3">
                <label class="form-label">New Password</label>
                <input 
                  type="password" 
                  formControlName="password" 
                  class="form-control" 
                  [class.is-invalid]="submitted && f['password'].errors"
                  placeholder="Enter new password (min. 6 characters)"
                >
                <div class="invalid-feedback" *ngIf="submitted && f['password'].errors">
                  <div *ngIf="f['password'].errors['required']">Password is required</div>
                  <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input 
                  type="password" 
                  formControlName="confirmPassword" 
                  class="form-control" 
                  [class.is-invalid]="submitted && f['confirmPassword'].errors"
                  placeholder="Confirm your new password"
                >
                <div class="invalid-feedback" *ngIf="submitted && f['confirmPassword'].errors">
                  <div *ngIf="f['confirmPassword'].errors['required']">Confirm Password is required</div>
                  <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
                </div>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary" [disabled]="loading">
                  <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                  Reset Password
                </button>
              </div>
              <div class="text-center mt-3">
                <a routerLink="/account/login" class="text-decoration-none">Back to Login</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
