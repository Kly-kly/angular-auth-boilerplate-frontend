<div class="card-body">
  <h3 class="card-title text-center mb-4">Register</h3>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="col-md-3 mb-3">
        <label class="form-label">Title</label>
        <select formControlName="title" class="form-select" [ngClass]="{'is-invalid': submitted && f['title'].errors}">
          <option value="">Select</option>
          <option value="Mr">Mr</option>
          <option value="Mrs">Mrs</option>
          <option value="Miss">Miss</option>
          <option value="Ms">Ms</option>
        </select>
        <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">Required</div>
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">First Name</label>
        <input type="text" formControlName="firstName" class="form-control" [ngClass]="{'is-invalid': submitted && f['firstName'].errors}">
        <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback">Required</div>
      </div>
      <div class="col-md-5 mb-3">
        <label class="form-label">Last Name</label>
        <input type="text" formControlName="lastName" class="form-control" [ngClass]="{'is-invalid': submitted && f['lastName'].errors}">
        <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback">Required</div>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" formControlName="email" class="form-control" [ngClass]="{'is-invalid': submitted && f['email'].errors}">
      <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
        <div *ngIf="f['email'].errors['required']">Required</div>
        <div *ngIf="f['email'].errors['email']">Valid email required</div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Password</label>
        <input type="password" formControlName="password" class="form-control" [ngClass]="{'is-invalid': submitted && f['password'].errors}">
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Required</div>
          <div *ngIf="f['password'].errors['minlength']">Minimum 6 characters</div>
        </div>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" formControlName="confirmPassword" class="form-control" [ngClass]="{'is-invalid': submitted && f['confirmPassword'].errors}">
        <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
          <div *ngIf="f['confirmPassword'].errors['required']">Required</div>
          <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
        </div>
      </div>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" formControlName="acceptTerms" class="form-check-input" [ngClass]="{'is-invalid': submitted && f['acceptTerms'].errors}">
      <label class="form-check-label">I accept the Terms and Conditions</label>
      <div *ngIf="submitted && f['acceptTerms'].errors" class="invalid-feedback">You must accept terms</div>
    </div>
    <div class="d-grid">
      <button type="submit" class="btn btn-success" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
        Register
      </button>
    </div>
    <div class="text-center mt-3">
      Already have an account? <a routerLink="../login">Login</a>
    </div>
  </form>
</div>
