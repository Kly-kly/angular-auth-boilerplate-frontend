<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Forgot Password</h3>
        </div>
        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input 
                type="email" 
                formControlName="email" 
                class="form-control" 
                [class.is-invalid]="submitted && f['email'].invalid"
                placeholder="Enter your email"
              >
              <div class="invalid-feedback" *ngIf="submitted && f['email'].invalid">
                <span *ngIf="f['email'].errors?.['required']">Email is required</span>
                <span *ngIf="f['email'].errors?.['email']">Please enter a valid email address</span>
              </div>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                Submit
              </button>
            </div>
            <div class="text-center mt-3">
              <a routerLink="/account/login" class="text-decoration-none">Back to Login</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
