<div class="card-body">
  <h3 class="card-title text-center mb-4">Login</h3>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" formControlName="email" class="form-control" [ngClass]="{'is-invalid': submitted && f['email'].errors}">
      <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
        <div *ngIf="f['email'].errors['required']">Email is required</div>
        <div *ngIf="f['email'].errors['email']">Valid email required</div>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" formControlName="password" class="form-control" [ngClass]="{'is-invalid': submitted && f['password'].errors}">
      <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">Password is required</div>
    </div>
    <div class="d-grid">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
        Login
      </button>
    </div>
    <div class="text-center mt-3">
      <a routerLink="/account/register" class="me-3">Register</a>
      <a routerLink="/account/forgot-password">Forgot Password?</a>
    </div>
  </form>
</div>
