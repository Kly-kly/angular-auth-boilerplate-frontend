<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Login</h3>
        </div>
        <div class="card-body">
          <!-- Error message display -->
          <div *ngIf="errorMessage" class="alert alert-danger text-center" role="alert">
            <strong>Error!</strong> {{ errorMessage }}
          </div>

          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input 
                type="email" 
                formControlName="email" 
                class="form-control" 
                [class.is-invalid]="submitted && f['email'].invalid"
                placeholder="Enter your email"
              >
              <div class="invalid-feedback" *ngIf="submitted && f['email'].invalid">
                Valid email is required
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input 
                type="password" 
                formControlName="password" 
                class="form-control" 
                [class.is-invalid]="submitted && f['password'].invalid"
                placeholder="Enter your password"
              >
              <div class="invalid-feedback" *ngIf="submitted && f['password'].invalid">
                Password is required
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                Login
              </button>
            </div>

            <div class="text-center mt-3">
              <a routerLink="/account/register" class="text-decoration-none me-3">Register</a>
              <a routerLink="/account/forgot-password" class="text-decoration-none">Forgot Password?</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
