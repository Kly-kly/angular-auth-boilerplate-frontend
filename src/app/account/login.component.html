<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Login</h3>
        </div>
        <div class="card-body">
          <!-- Display error message here -->
          <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <strong>Error!</strong> {{ errorMessage }}
            <button type="button" class="btn-close" (click)="clearError()" aria-label="Close"></button>
          </div>

          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input 
                type="email" 
                formControlName="email" 
                class="form-control" 
                [class.is-invalid]="submitted && f['email'].invalid"
                placeholder="Enter your email"
              >
              <div class="invalid-feedback" *ngIf="submitted && f['email'].invalid">
                <span *ngIf="f['email'].errors?.['required']">Email is required</span>
                <span *ngIf="f['email'].errors?.['email']">Please enter a valid email address</span>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input 
                type="password" 
                formControlName="password" 
                class="form-control" 
                [class.is-invalid]="submitted && f['password'].invalid"
                placeholder="Enter your password"
              >
              <div class="invalid-feedback" *ngIf="submitted && f['password'].invalid">
                <span *ngIf="f['password'].errors?.['required']">Password is required</span>
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Login
              </button>
            </div>

            <div class="text-center mt-3">
              <a routerLink="/account/register" class="text-decoration-none me-3">Register</a>
              <a routerLink="/account/forgot-password" class="text-decoration-none">Forgot Password?</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
